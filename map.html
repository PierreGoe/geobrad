<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geobrad — Braderies & Brocantes 2026</title>

  <!-- Leaflet -->
  <link  rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MarkerCluster -->
  <link  rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link  rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Données géocodées (généré par geocode.js) -->
  <script src="events_data.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Barre du haut ─── */
    #topbar {
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      z-index: 1000;
    }

    #topbar h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e94560;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #topbar h1 span { color: #aaa; font-weight: 400; font-size: .9rem; }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ctrl-group label {
      font-size: .8rem;
      color: #aaa;
      white-space: nowrap;
    }

    select, input[type=range] {
      background: #0f3460;
      color: #eee;
      border: 1px solid #e94560;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: .8rem;
      cursor: pointer;
    }

    button {
      background: #e94560;
      border: none;
      color: #fff;
      border-radius: 4px;
      padding: 6px 14px;
      font-size: .8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }
    button:hover { background: #c73652; }

    #count-badge {
      background: #0f3460;
      border: 1px solid #e94560;
      border-radius: 12px;
      padding: 3px 10px;
      font-size: .75rem;
      color: #e94560;
      white-space: nowrap;
    }

    /* ─── Carte ─── */
    #map {
      flex: 1;
      width: 100%;
    }

    /* ─── Popup Leaflet ─── */
    .leaflet-popup-content-wrapper {
      background: #16213e;
      color: #eee;
      border-radius: 8px;
      border: 1px solid #e94560;
      box-shadow: 0 4px 20px rgba(0,0,0,.6);
    }
    .leaflet-popup-tip { background: #e94560; }
    .leaflet-popup-content { margin: 0; min-width: 220px; max-width: 320px; }

    .popup-title {
      background: #e94560;
      color: #fff;
      padding: 10px 14px;
      font-weight: 700;
      font-size: .95rem;
      border-radius: 6px 6px 0 0;
    }

    .popup-body {
      padding: 10px 14px;
      font-size: .82rem;
      line-height: 1.6;
    }

    .popup-tag {
      display: inline-block;
      background: #0f3460;
      border: 1px solid #e94560;
      border-radius: 10px;
      padding: 1px 8px;
      font-size: .72rem;
      margin: 2px 2px 0 0;
      text-transform: capitalize;
      color: #e94560;
    }

    .popup-date {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      color: #8ecae6;
      font-size: .8rem;
    }

    .popup-section { margin-top: 8px; }
    .popup-section strong { color: #aaa; font-size: .76rem; text-transform: uppercase; letter-spacing: .05em; }
    .popup-link {
      display: inline-block;
      margin-top: 4px;
      color: #e94560;
      font-size: .78rem;
      text-decoration: none;
    }
    .popup-link:hover { text-decoration: underline; }

    /* Cluster personalisation */
    .marker-cluster-small  { background-color: rgba(100,160,255,.4) !important; }
    .marker-cluster-medium { background-color: rgba(100,160,255,.6) !important; }
    .marker-cluster-large  { background-color: rgba(100,160,255,.8) !important; }
    .marker-cluster { color: #fff !important; font-weight: 700; }

    /* ─── Légende mois ─── */
    #legend {
      position: absolute;
      bottom: 36px;
      right: 12px;
      background: #16213eee;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 10px 14px;
      z-index: 500;
      font-size: .76rem;
      line-height: 1.9;
      min-width: 120px;
      backdrop-filter: blur(4px);
    }
    #legend strong {
      display: block;
      color: #aaa;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }
    .legend-dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      border: 1px solid rgba(255,255,255,.3);
    }

    /* ─── Indicateur de géolocalisation ─── */
    #geo-status {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #16213e;
      border: 1px solid #e94560;
      color: #eee;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: .8rem;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity .4s;
    }
    #geo-status.show { opacity: 1; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🗺 Geobrad <span>— Braderies & Brocantes 2026</span></h1>

  <div class="ctrl-group">
    <label>Mois :</label>
    <select id="filter-month">
      <option value="">Tous</option>
      <option value="04">Avril</option>
      <option value="05">Mai</option>
      <option value="06">Juin</option>
      <option value="07">Juillet</option>
      <option value="08">Août</option>
      <option value="09">Septembre</option>
      <option value="10">Octobre</option>
      <option value="11">Novembre</option>
      <option value="12">Décembre</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>Type :</label>
    <select id="filter-type">
      <option value="">Tous</option>
      <option value="braderie">Braderie</option>
      <option value="brocante">Brocante</option>
      <option value="vide grenier">Vide-grenier</option>
      <option value="marché aux puces">Marché aux puces</option>
      <option value="bourse">Bourse</option>
      <option value="rederie">Rederie</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>Entrée libre :</label>
    <select id="filter-free">
      <option value="">Tous</option>
      <option value="1">Oui</option>
      <option value="0">Payant</option>
    </select>
  </div>

  <button id="btn-locate">📍 Autour de moi</button>
  <span id="count-badge">-- événements</span>
</div>

<div id="map"></div>
<div id="legend"></div>
<div id="geo-status"></div>

<script>
// ─── Init carte ──────────────────────────────────────────────────────
const map = L.map('map', {
  center : [50.6, 3.0],  // Nord de la France par défaut
  zoom   : 9,
});

L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
  attribution : '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributeurs | <a href="https://www.sabradou.com">sabradou.com</a>',
  maxZoom     : 19,
}).addTo(map);

// ─── Couleurs par mois ───────────────────────────────────────────────
const MONTH_COLORS = {
  '04': '#f9c74f',  // Avril  — jaune doré
  '05': '#90be6d',  // Mai    — vert tendre
  '06': '#43aa8b',  // Juin   — vert émeraude
  '07': '#4cc9f0',  // Juillet— bleu ciel
  '08': '#4361ee',  // Août   — bleu vif
  '09': '#7209b7',  // Sept.  — violet
  '10': '#f77f00',  // Oct.   — orange
  '11': '#d62828',  // Nov.   — rouge brique
  '12': '#e9c46a',  // Déc.   — or de Noël
  '01': '#a8dadc',  // Jan.   — bleu glacé
  '02': '#ff85a1',  // Fév.   — rose
  '03': '#80b918',  // Mars   — vert prairie
};
const MONTH_NAMES = {
  '04':'Avril','05':'Mai','06':'Juin','07':'Juillet',
  '08':'Août','09':'Septembre','10':'Octobre',
  '11':'Novembre','12':'Décembre','01':'Janvier',
  '02':'Février','03':'Mars',
};

/** Extrait le mois dominant (premier triés) des appearances d'un événement */
function eventMonth(ev) {
  const apps = ev.appearances || [];
  if (apps.length === 0) return null;
  const months = apps
    .map(a => a.date ? a.date.slice(5, 7) : null)
    .filter(Boolean);
  if (months.length === 0) return null;
  // mois le plus fréquent
  const freq = {};
  months.forEach(m => { freq[m] = (freq[m] || 0) + 1; });
  return Object.entries(freq).sort((a,b) => b[1]-a[1])[0][0];
}

// ─── Icône personnalisée (couleur = mois) ────────────────────────────
function makeIcon(month) {
  const color = MONTH_COLORS[month] || '#aaa';
  return L.divIcon({
    className : '',
    html      : `<div style="
      width:26px; height:26px; border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      background:${color};
      border:2px solid #fff;
      box-shadow:0 2px 8px rgba(0,0,0,.55);
    "></div>`,
    iconSize   : [26, 26],
    iconAnchor : [13, 26],
    popupAnchor: [0, -28],
  });
}

// ─── Couche cluster ───────────────────────────────────────────────────
const cluster = L.markerClusterGroup({
  showCoverageOnHover   : false,
  maxClusterRadius      : 60,
  spiderfyOnMaxZoom     : true,
  disableClusteringAtZoom : 13,
});
map.addLayer(cluster);

// ─── Construction du popup ───────────────────────────────────────────
function buildPopup(ev) {
  const types  = (ev.eventTypes  || []).join(', ') || 'Événement';
  const dates  = (ev.scheduledDates || []).slice(0, 4).join(' · ') || '—';
  const hours  = (ev.openingHours  || []).join(', ') || '';
  const cats   = (ev.categories    || []);
  const tags   = cats.map(c => `<span class="popup-tag">${c}</span>`).join('');
  const freeLabel = ev.freeEntry ? '<span class="popup-tag" style="color:#2ecc71;border-color:#2ecc71">entrée gratuite</span>'
                                  : '<span class="popup-tag" style="color:#e94560">entrée payante</span>';
  const pmr   = ev.accessiblePMR ? '♿ ' : '';
  const title  = `${pmr}${ev.city || ev.communeNom || 'Lieu inconnu'}`;
  const deptLbl = ev.departmentLabel ? `<br/><span style="color:#aaa;font-size:.76rem">${ev.departmentLabel}</span>` : '';

  let body = `
    <div class="popup-title">${title}${deptLbl}</div>
    <div class="popup-body">
      <div>${freeLabel}</div>
      <div class="popup-date">📅 ${dates}${hours ? ' · ⏰ ' + hours : ''}</div>
      ${tags ? `<div class="popup-section"><strong>Catégories</strong><br/>${tags}</div>` : ''}
      ${ev.address ? `<div class="popup-section"><strong>Lieu</strong><br/>${ev.address}</div>` : ''}
      ${ev.organizer ? `<div class="popup-section"><strong>Organisateur</strong><br/>${ev.organizer.slice(0, 120)}</div>` : ''}
      <div class="popup-section">
        <strong>Types</strong><br/>${types}
      </div>
      <a class="popup-link" href="${ev.url}" target="_blank" rel="noopener">🔗 Voir la fiche</a>
      ${ev.facebookUrl ? ` · <a class="popup-link" href="${ev.facebookUrl}" target="_blank" rel="noopener">Facebook</a>` : ''}
    </div>`;

  return body;
}

// ─── Rendu des marqueurs ─────────────────────────────────────────────
const allMarkers = [];

if (typeof SABRADOU_EVENTS === 'undefined') {
  document.getElementById('geo-status').textContent =
    '⚠  events_data.js introuvable — lance d\'abord : node geocode.js';
  document.getElementById('geo-status').classList.add('show');
} else {
  SABRADOU_EVENTS.forEach(ev => {
    if (ev.lat == null || ev.lng == null) return;
    const month = eventMonth(ev);
    const marker = L.marker([ev.lat, ev.lng], { icon: makeIcon(month) });
    marker.bindPopup(buildPopup(ev), { maxWidth: 340 });
    marker._evData  = ev;
    marker._month   = month;
    allMarkers.push(marker);
  });

  // ─── Légende dynamique ─────────────────────────────────────────────
  const usedMonths = [...new Set(allMarkers.map(m => m._month).filter(Boolean))]
    .sort();
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '<strong>Mois</strong>' +
    usedMonths.map(m =>
      `<div><span class="legend-dot" style="background:${MONTH_COLORS[m]}"></span>${MONTH_NAMES[m] || m}</div>`
    ).join('');
}

function applyFilters() {
  const month = document.getElementById('filter-month').value;
  const type  = document.getElementById('filter-type').value.toLowerCase();
  const free  = document.getElementById('filter-free').value;

  cluster.clearLayers();
  let count = 0;

  allMarkers.forEach(m => {
    const ev = m._evData;

    // Filtre mois : on cherche dans les appearances (date ISO 2026-MM-DD)
    if (month) {
      const hasMonth = (ev.appearances || []).some(a => a.date && a.date.slice(5, 7) === month);
      if (!hasMonth) return;
    }

    // Filtre type
    if (type) {
      const types = (ev.eventTypes || []).join(' ').toLowerCase();
      if (!types.includes(type)) return;
    }

    // Filtre gratuit
    if (free === '1' && !ev.freeEntry)  return;
    if (free === '0' && ev.freeEntry)   return;

    cluster.addLayer(m);
    count++;
  });

  document.getElementById('count-badge').textContent = `${count} événement${count > 1 ? 's' : ''}`;
}

// Init
applyFilters();

document.getElementById('filter-month').addEventListener('change', applyFilters);
document.getElementById('filter-type').addEventListener('change', applyFilters);
document.getElementById('filter-free').addEventListener('change', applyFilters);

// ─── Géolocalisation ─────────────────────────────────────────────────
let userCircle   = null;
let userMarker   = null;

document.getElementById('btn-locate').addEventListener('click', () => {
  const statusEl = document.getElementById('geo-status');

  if (!navigator.geolocation) {
    show(statusEl, '⚠ Géolocalisation non disponible dans ce navigateur');
    return;
  }

  statusEl.textContent = '🔍 Localisation en cours…';
  statusEl.classList.add('show');

  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;

      // Supprimer l'ancienne position
      if (userMarker) map.removeLayer(userMarker);
      if (userCircle) map.removeLayer(userCircle);

      // Cercle de précision
      userCircle = L.circle([lat, lng], {
        radius      : accuracy,
        color       : '#8ecae6',
        fillColor   : '#8ecae6',
        fillOpacity : 0.15,
        weight      : 1,
        dashArray   : '4 4',
      }).addTo(map);

      // Marqueur "moi"
      userMarker = L.marker([lat, lng], {
        icon: L.divIcon({
          className : '',
          html: `<div style="
            width:18px; height:18px; border-radius:50%;
            background:#8ecae6; border:3px solid #fff;
            box-shadow:0 0 0 4px rgba(142,202,230,.35);
          "></div>`,
          iconSize   : [18, 18],
          iconAnchor : [9, 9],
        }),
      }).addTo(map).bindPopup('<b>📍 Vous êtes ici</b>').openPopup();

      map.setView([lat, lng], 11);

      show(statusEl, `📍 Position trouvée (précision ~${Math.round(accuracy)} m)`, 3000);
    },
    err => {
      show(statusEl, `⚠ ${err.message}`, 4000);
    },
    { enableHighAccuracy: true, timeout: 10_000 }
  );
});

function show(el, msg, autoHide) {
  el.textContent = msg;
  el.classList.add('show');
  if (autoHide) setTimeout(() => el.classList.remove('show'), autoHide);
}
</script>
</body>
</html>
