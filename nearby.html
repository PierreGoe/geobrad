    <option value="04">Avril</option>
    <option value="05">Mai</option>
    <option value="06">Juin</option>
    <option value="07">Juillet</option>
    <option value="08">Août</option>
    <option value="09">Septembre</option>
    <option value="10">Octobre</option>
    <option value="11">Novembre</option>
    <option value="12">Décembre</option>
  </select>

  <label>Entrée :</label>
  <select id="filter-free">
    <option value="">Toutes</option>
    <option value="1">Libre</option>
    <option value="0">Payante</option>
  </select>
</div>

<div id="ref-cities"></div>
<div id="stats"></div>

<div id="table-wrap">
  <table id="result-table">
    <thead>
      <tr>
        <th data-col="date">Date</th>
        <th data-col="name">Nom</th>
        <th data-col="city">Ville</th>
        <th data-col="cat">Catégorie</th>
        <th data-col="free" title="Entrée libre">Libre</th>
        <!-- colonnes ref insérées dynamiquement par rebuildTableHeaders() -->
        <th data-col="min" title="Distance minimum parmi les villes de référence">Min. ↔</th>
        <th>Lien</th>
        <th title="Ajouter à Google Agenda">📅 Agenda</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<footer style="background:rgba(17,17,27,.88);color:#6c7086;font-size:.72rem;text-align:center;padding:4px 12px;flex-shrink:0;">
  Geobrad &mdash; Projet à but non lucratif, sans publicité, sans collecte de données.
  Sources : <a href="https://brocabrac.fr" target="_blank" rel="noopener" style="color:#89b4fa">brocabrac.fr</a> &amp;
  <a href="http://www.sabradou.com" target="_blank" rel="noopener" style="color:#89b4fa">sabradou.com</a>.
  Usage strictement personnel.
</footer>

<script>
// ── Constantes ─────────────────────────────────────────────────────────────
const LS_REFS_KEY = 'geobrad_ref_cities';
const DEFAULT_REFS = [
  { name: 'Roubaix',      lat: 50.6887, lng: 3.1843, color: '#ff6b6b' },
  { name: 'Armentières',  lat: 50.6925, lng: 2.8787, color: '#ffd166' },
  { name: 'Audresselles', lat: 50.8288, lng: 1.6131, color: '#06d6a0' },
];
const COLOR_POOL = [
  '#ff6b6b','#ffd166','#06d6a0','#4cc9f0','#a8dadc',
  '#f4a261','#e9c46a','#b5838d','#6d6875','#80b918',
];

// ── Chargement depuis localStorage ─────────────────────────────────────────
let REFS;
try {
  const stored = JSON.parse(localStorage.getItem(LS_REFS_KEY));
  REFS = Array.isArray(stored) && stored.length > 0 ? stored : DEFAULT_REFS.map(r => ({...r}));
} catch(e) {
  REFS = DEFAULT_REFS.map(r => ({...r}));
}

// ── Haversine (km) ──────────────────────────────────────────────────────────
function dist(lat1, lon1, lat2, lon2) {
  const R = 6371, r = Math.PI / 180;
  const dLat = (lat2 - lat1) * r;
  const dLon = (lon2 - lon1) * r;
  const a = Math.sin(dLat / 2) ** 2
          + Math.cos(lat1 * r) * Math.cos(lat2 * r) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ── Helpers date ────────────────────────────────────────────────────────────
const MONTH_NAMES = {
  '01':'Jan.','02':'Fév.','03':'Mars','04':'Avr.','05':'Mai','06':'Juin',
  '07':'Juil.','08':'Août','09':'Sept.','10':'Oct.','11':'Nov.','12':'Déc.',
};

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso.slice(0, 10);
  const j = ['dim.','lun.','mar.','mer.','jeu.','ven.','sam.'][d.getDay()];
  return `${j} ${d.getDate()} ${MONTH_NAMES[String(d.getMonth()+1).padStart(2,'0')]} ${d.getFullYear()}`;
}

function fmtTime(iso) {
  if (!iso || !iso.includes('T')) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function isoDate(ev) {
  if (ev.startDate) return ev.startDate;
  const apps = ev.appearances || [];
  return apps[0]?.date || '';
}

function eventMonth(ev) {
  const d = isoDate(ev);
  return d.length >= 7 ? d.slice(5, 7) : null;
}

function eventCategory(ev) {
  if (ev.category) return ev.category;
  const t = (ev.eventTypes || []).join(' ').toLowerCase();
  if (t.includes('braderie'))    return 'braderie';
  if (t.includes('brocante'))    return 'brocante';
  if (t.includes('vide-grenier') || t.includes('vide grenier')) return 'vide-grenier';
  return 'autre';
}

// ── Geocodage Nominatim ─────────────────────────────────────────────────────
async function geocodeCity(name) {
  const url = 'https://nominatim.openstreetmap.org/search?q='
    + encodeURIComponent(name)
    + '&format=json&limit=1&countrycodes=fr';
  const resp = await fetch(url, { headers: { 'Accept-Language': 'fr' } });
  if (!resp.ok) throw new Error('Erreur réseau');
  const data = await resp.json();
  if (!data.length) throw new Error(`"${name}" introuvable en France`);
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
}

// ── Fusion datasets ─────────────────────────────────────────────────────────
const allEvents = [];

function pushDataset(arr, source) {
  (arr || []).forEach(ev => {
    if (ev.lat == null || ev.lng == null) return;
    allEvents.push({ ...ev, _source: source });
  });
}

pushDataset(typeof BROCABRAC_EVENTS !== 'undefined' ? BROCABRAC_EVENTS : [], 'brocabrac');
pushDataset(typeof SABRADOU_EVENTS  !== 'undefined' ? SABRADOU_EVENTS  : [], 'sabradou');

function computeDistances() {
  allEvents.forEach(ev => {
    ev._dists    = REFS.map(r => dist(ev.lat, ev.lng, r.lat, r.lng));
    ev._dMin     = Math.min(...ev._dists);
    ev._isoDate  = isoDate(ev);
    ev._category = eventCategory(ev);
  });
}
computeDistances();

// ── Carte ───────────────────────────────────────────────────────────────────
const map = L.map('map').setView([REFS[0].lat, REFS[0].lng], 9);
L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributeurs',
  maxZoom: 18,
}).addTo(map);

let circleObjects = [];
let pinObjects    = [];
const eventLayer  = L.layerGroup().addTo(map);

function rebuildMapCircles() {
  const radius = parseInt(document.getElementById('radius-slider').value, 10);
  circleObjects.forEach(c => map.removeLayer(c));
  pinObjects.forEach(p => map.removeLayer(p));
  circleObjects = [];
  pinObjects    = [];
  REFS.forEach(r => {
    const c = L.circle([r.lat, r.lng], {
      radius: radius * 1000,
      color: r.color, fillColor: r.color,
      fillOpacity: 0.06, weight: 2, dashArray: '6 4',
    }).addTo(map);
    const p = L.circleMarker([r.lat, r.lng], {
      radius: 9, color: '#fff', fillColor: r.color, fillOpacity: 1, weight: 2,
    }).addTo(map).bindPopup(`<b>${r.name}</b><br/>Rayon : ${radius} km`);
    circleObjects.push(c);
    pinObjects.push(p);
  });
}

// ── En-têtes de tableau dynamiques ─────────────────────────────────────────
function rebuildTableHeaders() {
  const tr = document.querySelector('#result-table thead tr');
  [...tr.querySelectorAll('th[data-col^="ref"]')].forEach(th => th.remove());
  const minTh = tr.querySelector('th[data-col="min"]');
  REFS.forEach((r, i) => {
    const th = document.createElement('th');
    th.dataset.col = 'ref' + i;
    th.title = 'Distance vol d\'oiseau depuis ' + r.name;
    const dot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${r.color};margin-right:3px;vertical-align:middle;"></span>`;
    th.innerHTML = dot + '&#8596; ' + r.name;
    tr.insertBefore(th, minTh);
    th.addEventListener('click', () => {
      if (sortCol === 'ref' + i) sortDesc = !sortDesc;
      else { sortCol = 'ref' + i; sortDesc = false; }
      render();
    });
  });
}

// ── Barre des villes de référence ──────────────────────────────────────────
function rebuildRefCitiesBar() {
  document.getElementById('ref-cities').innerHTML = REFS.map(r =>
    `<span class="ref-city"><span class="dot" style="background:${r.color}"></span><strong>${r.name}</strong></span>`
  ).join('');
}

// ── Panel (liste des villes) ────────────────────────────────────────────────
function rebuildPanel() {
  const ul = document.getElementById('refs-list');
  ul.innerHTML = '';
  REFS.forEach((r, i) => {
    const li = document.createElement('li');
    li.innerHTML =
      `<span class="dot" style="background:${r.color}"></span>` +
      `<span style="flex:1">${r.name}</span>` +
      `<button class="btn-del-ref" data-idx="${i}" title="Supprimer">&#x2715;</button>`;
    ul.appendChild(li);
  });
  document.getElementById('btn-ref-cities').textContent =
    '\u{1F3D9} Villes de r\u00e9f\u00e9rence (' + REFS.length + ')';
}

function saveRefs() {
  localStorage.setItem(LS_REFS_KEY, JSON.stringify(REFS));
}

function onRefsChanged() {
  computeDistances();
  rebuildTableHeaders();
  rebuildMapCircles();
  rebuildRefCitiesBar();
  rebuildPanel();
  if (REFS.length > 0) map.setView([REFS[0].lat, REFS[0].lng], 9);
  render();
}

// ── Couleurs catégories ─────────────────────────────────────────────────────
const CAT_COLORS = {
  braderie:       '#e94560',
  brocante:       '#f77f00',
  'vide-grenier': '#43aa8b',
  autre:          '#aaa',
};

// ── État du tri ──────────────────────────────────────────────────────────────
let sortCol  = 'date';
let sortDesc = false;

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const radius     = parseInt(document.getElementById('radius-slider').value, 10);
  const catFilter  = document.getElementById('filter-cat').value;
  const monthFilt  = document.getElementById('filter-month').value;
  const freeFilter = document.getElementById('filter-free').value;
  const dateFrom   = document.getElementById('filter-date').value;

  // Mise à jour des cercles
  circleObjects.forEach(c => c.setRadius(radius * 1000));
  pinObjects.forEach((p, i) =>
    p.setPopupContent(`<b>${REFS[i].name}</b><br/>Rayon\u00a0: ${radius}\u00a0km`)
  );

  // Filtrage
  const rows = allEvents.filter(ev => {
    if (ev._dMin > radius) return false;
    if (catFilter  && ev._category !== catFilter) return false;
    if (monthFilt  && eventMonth(ev) !== monthFilt) return false;
    if (freeFilter === '1' && !ev.freeEntry) return false;
    if (freeFilter === '0' &&  ev.freeEntry) return false;
    if (dateFrom   && ev._isoDate < dateFrom) return false;
    return true;
  });

  // Tri
  rows.sort((a, b) => {
    let va, vb;
    if (sortCol === 'date')      { va = a._isoDate;  vb = b._isoDate; }
    else if (sortCol === 'name') {
      va = (a.name || a.city || '').toLowerCase();
      vb = (b.name || b.city || '').toLowerCase();
    }
    else if (sortCol === 'city') {
      va = (a.city || '').toLowerCase();
      vb = (b.city || '').toLowerCase();
    }
    else if (sortCol === 'cat')  { va = a._category; vb = b._category; }
    else if (sortCol === 'free') { va = a.freeEntry ? 0 : 1; vb = b.freeEntry ? 0 : 1; }
    else if (sortCol === 'min')  { va = a._dMin; vb = b._dMin; }
    else if (sortCol.startsWith('ref')) {
      const i = parseInt(sortCol.slice(3), 10);
      va = (a._dists || [])[i] ?? 9999;
      vb = (b._dists || [])[i] ?? 9999;
    }
    else { va = 0; vb = 0; }
    if (va < vb) return sortDesc ? 1 : -1;
    if (va > vb) return sortDesc ? -1 : 1;
    return 0;
  });

  // Stats
  document.getElementById('stats').innerHTML =
    `<strong>${rows.length}</strong> \u00e9v\u00e9nement${rows.length !== 1 ? 's' : ''} ` +
    `dans un rayon de <strong>${radius}\u00a0km</strong> ` +
    `autour de ${REFS.map(r => r.name).join(', ')}.`;

  // Tableau
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  rows.forEach(ev => {
    const minIdx = ev._dists.indexOf(ev._dMin);
    const start  = fmtTime(ev._isoDate);
    const end    = fmtTime(ev.endDate || '');
    const hours  = start
      ? ` <span style="color:#8ecae6;font-size:.74rem">&#x23F0;${start}${end && end !== start ? '\u2013'+end : ''}</span>`
      : '';

    let dateCell = fmtDate(ev._isoDate) + hours;
    if (ev._source === 'sabradou' && ev.appearances && ev.appearances.length > 1) {
      const extra = ev.appearances.slice(1, 4).map(a => fmtDate(a.date)).join(' \u00b7 ');
      const more  = ev.appearances.length > 4
        ? ` <span style="color:#aaa">+${ev.appearances.length - 4} dates</span>`
        : '';
      dateCell += `<br/><span style="color:#aaa;font-size:.73rem">${extra}${more}</span>`;
    }

    const nameCell = ev.name
      ? `<span class="td-name">${ev.name}</span>`
      : `<span class="td-name">${ev.city || '?'}</span>`;

    const addr = [ev.placeName, ev.streetAddress].filter(Boolean).join(' \u2014 ');
    const cityCell =
      `<span class="td-city">${ev.city || ''}` +
      (ev.postalCode ? ` <span style="color:#666">(${ev.postalCode})</span>` : '') +
      `</span>` +
      (addr ? `<br/><span style="color:#555;font-size:.72rem">${addr}</span>` : '');

    const catCls   = 'cat-' + ev._category;
    const refCells = REFS.map((r, i) => {
      const cls = i === minIdx ? 'dist-min' : 'dist-val';
      return `<td class="td-dist"><span class="${cls}">${(ev._dists[i] || 0).toFixed(1)}\u00a0km</span></td>`;
    }).join('');

    const gcalHref = buildGCalUrl(ev);
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td class="td-date">${dateCell}</td>` +
      `<td>${nameCell}</td>` +
      `<td>${cityCell}</td>` +
      `<td class="td-cat"><span class="cat-badge ${catCls}">${ev._category}</span></td>` +
      `<td class="td-free">${ev.freeEntry ? '\u2705' : '\uD83D\uDCB6'}</td>` +
      refCells +
      `<td class="td-dist" style="background:#0f3460">` +
        `<span class="dist-min">${ev._dMin.toFixed(1)}\u00a0km</span>` +
        `<br/><span style="color:#aaa;font-size:.70rem">(${REFS[minIdx]?.name || '?'})</span>` +
      `</td>` +
      `<td class="td-link"><a href="${ev.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">\uD83D\uDD17</a></td>` +
      `<td><a class="gcal-btn" href="${gcalHref}" target="_blank" rel="noopener" onclick="event.stopPropagation()">+ Google</a></td>`;
    tr.addEventListener('click', () => window.open(ev.url, '_blank'));
    tbody.appendChild(tr);
  });

  // Marqueurs tri
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (th.dataset.col === sortCol) th.classList.add(sortDesc ? 'sorted-desc' : 'sorted-asc');
  });

  // Carte événements
  eventLayer.clearLayers();
  rows.forEach(ev => {
    const color = CAT_COLORS[ev._category] || '#aaa';
    L.circleMarker([ev.lat, ev.lng], {
      radius: 7, color: '#fff', fillColor: color, fillOpacity: 0.9, weight: 1.5,
    })
    .bindPopup(
      `<b>${ev.name || ev.city}</b><br/>` +
      `${ev.city || ''}${ev.postalCode ? ' ('+ev.postalCode+')' : ''}<br/>` +
      `\uD83D\uDCC5 ${fmtDate(ev._isoDate)}<br/>` +
      REFS.map((r, i) => `\u2194 ${r.name}\u00a0: ${(ev._dists[i]||0).toFixed(1)}\u00a0km`).join('<br/>') +
      `<br/><a href="${ev.url}" target="_blank">Voir la fiche \u2192</a>`
    )
    .addTo(eventLayer);
  });
}

// ── Google Calendar URL ─────────────────────────────────────────────────────
function toGCalDate(iso) {
  if (!iso) return null;
  if (!iso.includes('T')) return iso.replace(/-/g, '');
  const d = new Date(iso);
  if (isNaN(d)) return iso.replace(/-/g, '').slice(0, 8);
  const pad = n => String(n).padStart(2, '0');
  return '' + d.getUTCFullYear() + pad(d.getUTCMonth()+1) + pad(d.getUTCDate())
       + 'T' + pad(d.getUTCHours()) + pad(d.getUTCMinutes()) + '00Z';
}

function buildGCalUrl(ev) {
  const start  = toGCalDate(ev._isoDate || ev.startDate);
  const end    = toGCalDate(ev.endDate) || start;
  const dates  = start ? (start + '/' + end) : '';
  const title  = ev.name || ev.city || '\u00c9v\u00e9nement';
  const loc    = [ev.placeName, ev.streetAddress, ev.city, ev.postalCode]
    .filter(Boolean).join(', ');
  const details = [
    ev.description ? ev.description.slice(0, 300) : '',
    ev.organizer   ? 'Organisateur\u00a0: ' + ev.organizer : '',
    ev.freeEntry !== undefined ? (ev.freeEntry ? 'Entr\u00e9e gratuite' : 'Entr\u00e9e payante') : '',
    'Source\u00a0: ' + ev.url,
  ].filter(Boolean).join('\n');
  const p = new URLSearchParams({ action: 'TEMPLATE', text: title });
  if (dates)   p.set('dates',    dates);
  if (loc)     p.set('location', loc);
  if (details) p.set('details',  details);
  return 'https://calendar.google.com/calendar/render?' + p.toString();
}

// ── Listeners tri colonnes fixes ────────────────────────────────────────────
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (col.startsWith('ref')) return; // géré par rebuildTableHeaders
    if (sortCol === col) sortDesc = !sortDesc;
    else { sortCol = col; sortDesc = false; }
    render();
  });
});

// ── Slider rayon ────────────────────────────────────────────────────────────
const slider = document.getElementById('radius-slider');
slider.addEventListener('input', () => {
  document.getElementById('radius-label').textContent = slider.value + ' km';
  render();
});

document.getElementById('filter-cat').addEventListener('change', render);
document.getElementById('filter-month').addEventListener('change', render);
document.getElementById('filter-free').addEventListener('change', render);
document.getElementById('filter-date').addEventListener('change', render);

// ── Panel des villes de référence ───────────────────────────────────────────
document.getElementById('btn-ref-cities').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('ref-cities-panel').classList.toggle('hidden');
});

document.addEventListener('click', e => {
  const panel = document.getElementById('ref-cities-panel');
  const btn   = document.getElementById('btn-ref-cities');
  if (!panel.classList.contains('hidden') && !panel.contains(e.target) && e.target !== btn) {
    panel.classList.add('hidden');
  }
});

document.getElementById('btn-add-ref').addEventListener('click', async () => {
  const input    = document.getElementById('new-ref-name');
  const name     = input.value.trim();
  if (!name) return;
  const statusEl = document.getElementById('geocode-status');
  const addBtn   = document.getElementById('btn-add-ref');
  statusEl.textContent = '\uD83D\uDD0D G\u00e9ocodage "' + name + '"\u2026';
  statusEl.style.color = '#aaa';
  addBtn.disabled = true;
  try {
    const { lat, lng } = await geocodeCity(name);
    const color = COLOR_POOL[REFS.length % COLOR_POOL.length];
    REFS.push({ name, lat, lng, color });
    saveRefs();
    onRefsChanged();
    input.value = '';
    statusEl.textContent = '\u2705 ' + name + ' ajout\u00e9';
    statusEl.style.color = '#90be6d';
    setTimeout(() => { statusEl.textContent = ''; }, 3000);
  } catch(err) {
    statusEl.textContent = '\u274C ' + err.message;
    statusEl.style.color = '#e94560';
  } finally {
    addBtn.disabled = false;
  }
});

document.getElementById('new-ref-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-add-ref').click();
});

document.getElementById('refs-list').addEventListener('click', e => {
  if (e.target.classList.contains('btn-del-ref')) {
    const idx = parseInt(e.target.dataset.idx, 10);
    if (REFS.length <= 1) {
      alert('Il doit rester au moins une ville de r\u00e9f\u00e9rence.');
      return;
    }
    REFS.splice(idx, 1);
    saveRefs();
    onRefsChanged();
  }
});

document.getElementById('btn-reset-refs').addEventListener('click', () => {
  REFS.length = 0;
  DEFAULT_REFS.forEach(r => REFS.push({ ...r }));
  localStorage.removeItem(LS_REFS_KEY);
  onRefsChanged();
});

// ── Initialisation ──────────────────────────────────────────────────────────
document.getElementById('filter-date').value = new Date().toISOString().slice(0, 10);
rebuildTableHeaders();
rebuildMapCircles();
rebuildRefCitiesBar();
rebuildPanel();
render();
</script>
</body>
</html>
