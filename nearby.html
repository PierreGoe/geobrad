<script>
// ── Villes de référence ────────────────────────────────────────────────
const REFS = [
  { name: 'Roubaix',      lat: 50.6887, lng: 3.1843, color: '#ff6b6b' },
  { name: 'Armentières',  lat: 50.6925, lng: 2.8787, color: '#ffd166' },
  { name: 'Audresselles', lat: 50.8288, lng: 1.6131, color: '#06d6a0' },
];

// ── Haversine (km) ────────────────────────────────────────────────────
function dist(lat1, lon1, lat2, lon2) {
  const R = 6371, r = Math.PI / 180;
  const dLat = (lat2 - lat1) * r;
  const dLon = (lon2 - lon1) * r;
  const a = Math.sin(dLat / 2) ** 2
          + Math.cos(lat1 * r) * Math.cos(lat2 * r) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

const MONTH_NAMES = {
  '01':'Jan.','02':'Fév.','03':'Mars',
  '04':'Avr.','05':'Mai','06':'Juin',
  '07':'Juil.','08':'Août','09':'Sept.',
  '10':'Oct.','11':'Nov.','12':'Déc.',
};

// ── Formatage date ────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso.slice(0, 10);
  const j = ['dim.','lun.','mar.','mer.','jeu.','ven.','sam.'][d.getDay()];
  return `${j} ${d.getDate()} ${MONTH_NAMES[String(d.getMonth()+1).padStart(2,'0')]} ${d.getFullYear()}`;
}

function fmtTime(iso) {
  if (!iso || !iso.includes('T')) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function isoDate(ev) {
  // brocabrac a startDate, sabradou a appearances[0].date
  if (ev.startDate) return ev.startDate;
  const apps = ev.appearances || [];
  return apps[0]?.date || '';
}

function eventMonth(ev) {
  const d = isoDate(ev);
  return d.length >= 7 ? d.slice(5, 7) : null;
}

function eventCategory(ev) {
  // brocabrac: ev.category
  if (ev.category) return ev.category;
  // sabradou: ev.eventTypes
  const t = (ev.eventTypes || []).join(' ').toLowerCase();
  if (t.includes('braderie'))    return 'braderie';
  if (t.includes('brocante'))    return 'brocante';
  if (t.includes('vide-grenier') || t.includes('vide grenier')) return 'vide-grenier';
  return 'autre';
}

// ── Fusion des deux datasets ──────────────────────────────────────────
const allEvents = [];

function pushDataset(arr, source) {
  (arr || []).forEach(ev => {
    if (ev.lat == null || ev.lng == null) return;
    allEvents.push({ ...ev, _source: source });
  });
}

pushDataset(typeof BROCABRAC_EVENTS !== 'undefined' ? BROCABRAC_EVENTS : [], 'brocabrac');
pushDataset(typeof SABRADOU_EVENTS  !== 'undefined' ? SABRADOU_EVENTS  : [], 'sabradou');

// Calcul des distances pour chaque event
allEvents.forEach(ev => {
  ev._dists = REFS.map(r => dist(ev.lat, ev.lng, r.lat, r.lng));
  ev._dMin  = Math.min(...ev._dists);
  ev._isoDate = isoDate(ev);
  ev._category = eventCategory(ev);
});

// ── Carte ─────────────────────────────────────────────────────────────
const map = L.map('map').setView([50.72, 2.7], 9);
L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributeurs',
  maxZoom: 18,
}).addTo(map);

// Cercles des 3 villes
const circleGroups = REFS.map(r => {
  const circle = L.circle([r.lat, r.lng], {
    radius: 30000,
    color: r.color, fillColor: r.color,
    fillOpacity: 0.06, weight: 2, dashArray: '6 4',
  }).addTo(map);

  L.circleMarker([r.lat, r.lng], {
    radius: 9, color: '#fff', fillColor: r.color,
    fillOpacity: 1, weight: 2,
  }).addTo(map).bindPopup(`<b>${r.name}</b><br/>Rayon : <span id="popup-radius-${r.name}">30</span> km`);

  return { circle, r };
});

// Couche des événements proches
const eventLayer = L.layerGroup().addTo(map);

// ── Rendu du tableau + carte ──────────────────────────────────────────
const CAT_COLORS = {
  braderie:     '#e94560',
  brocante:     '#f77f00',
  'vide-grenier': '#43aa8b',
  autre:        '#aaa',
};

let sortCol  = 'date';
let sortDesc = false;

function render() {
  const radius    = parseInt(document.getElementById('radius-slider').value, 10);
  const catFilter = document.getElementById('filter-cat').value;
  const monthFilt = document.getElementById('filter-month').value;
  const freeFilter= document.getElementById('filter-free').value;

  // Mise à jour des cercles
  circleGroups.forEach(({ circle }) => circle.setRadius(radius * 1000));

  // Filtrage
  let rows = allEvents.filter(ev => {
    if (ev._dMin > radius) return false;
    if (catFilter  && ev._category !== catFilter) return false;
    if (monthFilt  && eventMonth(ev) !== monthFilt) return false;
    if (freeFilter === '1' && !ev.freeEntry) return false;
    if (freeFilter === '0' &&  ev.freeEntry) return false;
    return true;
  });

  // Tri
  rows.sort((a, b) => {
    let va, vb;
    if (sortCol === 'date')      { va = a._isoDate;  vb = b._isoDate; }
    else if (sortCol === 'name') { va = a.name || a.city || ''; vb = b.name || b.city || ''; }
    else if (sortCol === 'city') { va = a.city || ''; vb = b.city || ''; }
    else if (sortCol === 'cat')  { va = a._category;  vb = b._category; }
    else if (sortCol === 'free') { va = a.freeEntry ? 0 : 1; vb = b.freeEntry ? 0 : 1; }
    else if (sortCol === 'min')  { va = a._dMin; vb = b._dMin; }
    else if (sortCol === 'roubaix')      { va = a._dists[0]; vb = b._dists[0]; }
    else if (sortCol === 'armentieres')  { va = a._dists[1]; vb = b._dists[1]; }
    else if (sortCol === 'audresselles') { va = a._dists[2]; vb = b._dists[2]; }
    else { va = 0; vb = 0; }
    if (va < vb) return sortDesc ? 1 : -1;
    if (va > vb) return sortDesc ? -1 : 1;
    return 0;
  });

  // Stats
  document.getElementById('stats').innerHTML =
    `<strong>${rows.length}</strong> événément${rows.length !== 1 ? 's' : ''} trouvé${rows.length !== 1 ? 's' : ''} dans un rayon de <strong>${radius} km</strong> autour de Roubaix, Armentières ou Audresselles.`;

  // Tableau
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  rows.forEach(ev => {
    const minIdx = ev._dists.indexOf(ev._dMin);
    const dists  = ev._dists.map((d, i) => {
      const cls = i === minIdx ? 'dist-min' : 'dist-val';
      return `<span class="${cls}">${d.toFixed(1)} km</span>`;
    });

    const start  = fmtTime(ev._isoDate);
    const end    = fmtTime(ev.endDate || '');
    const hours  = start ? ` <span style="color:#8ecae6;font-size:.74rem">⏰${start}${end && end !== start ? '–'+end : ''}</span>` : '';

    const catCls = 'cat-' + ev._category;

    // sabradou : toutes les dates séparées par "·"
    let dateCell = fmtDate(ev._isoDate) + hours;
    if (ev._source === 'sabradou' && ev.appearances && ev.appearances.length > 1) {
      const extra = ev.appearances.slice(1, 4).map(a => fmtDate(a.date)).join(' · ');
      const more  = ev.appearances.length > 4 ? ` <span style="color:#aaa">+${ev.appearances.length - 4} dates</span>` : '';
      dateCell += `<br/><span style="color:#aaa;font-size:.73rem">${extra}${more}</span>`;
    }

    const nameCell = ev.name
      ? `<span class="td-name">${ev.name}</span>`
      : `<span class="td-name">${ev.city || '?'}</span>`;

    const addr = [ev.placeName, ev.streetAddress].filter(Boolean).join(' — ');
    const cityCell = `<span class="td-city">${ev.city || ''}${ev.postalCode ? ' <span style="color:#666">('+ev.postalCode+')</span>' : ''}</span>`
      + (addr ? `<br/><span style="color:#555;font-size:.72rem">${addr}</span>` : '');

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-date">${dateCell}</td>
      <td>${nameCell}</td>
      <td>${cityCell}</td>
      <td class="td-cat"><span class="cat-badge ${catCls}">${ev._category}</span></td>
      <td class="td-free">${ev.freeEntry ? '✅' : '💶'}</td>
      <td class="td-dist">${dists[0]}</td>
      <td class="td-dist">${dists[1]}</td>
      <td class="td-dist">${dists[2]}</td>
      <td class="td-dist" style="background:#0f3460">${dists[minIdx]}<br/><span style="color:#aaa;font-size:.70rem">(${REFS[minIdx].name})</span></td>
      <td class="td-link"><a href="${ev.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗</a></td>
      <td><a class="gcal-btn" href="${buildGCalUrl(ev)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">+ Google</a></td>
    `;
    tr.addEventListener('click', () => window.open(buildGCalUrl(ev), '_blank'));
    tbody.appendChild(tr);
  });

  // Mise à jour des en-têtes triés
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (th.dataset.col === sortCol) {
      th.classList.add(sortDesc ? 'sorted-desc' : 'sorted-asc');
    }
  });

  // Carte : effacer et re-ajouter
  eventLayer.clearLayers();

  // Cercles : couleur par catégorie
  rows.forEach(ev => {
    const color = CAT_COLORS[ev._category] || '#aaa';
    L.circleMarker([ev.lat, ev.lng], {
      radius: 7, color: '#fff', fillColor: color,
      fillOpacity: 0.9, weight: 1.5,
    })
    .bindPopup(`
      <b>${ev.name || ev.city}</b><br/>
      ${ev.city} ${ev.postalCode ? '('+ev.postalCode+')' : ''}<br/>
      📅 ${fmtDate(ev._isoDate)}<br/>
      ${REFS.map((r, i) => `↔ ${r.name} : ${ev._dists[i].toFixed(1)} km`).join('<br/>')}
      <br/><a href="${ev.url}" target="_blank">Voir la fiche →</a>
    `)
    .addTo(eventLayer);
  });
}

// ── Google Calendar URL ─────────────────────────────────────────────
function toGCalDate(iso) {
  if (!iso) return null;
  // All-day: "2026-05-01" → "20260501"
  if (!iso.includes('T')) return iso.replace(/-/g, '');
  // DateTime: convert to UTC compact format
  const d = new Date(iso);
  if (isNaN(d)) return iso.replace(/-/g, '').slice(0, 8);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}00Z`;
}

function buildGCalUrl(ev) {
  const start = toGCalDate(ev._isoDate || ev.startDate);
  const end   = toGCalDate(ev.endDate) || start;
  const dates = start ? `${start}/${end}` : '';

  const title    = ev.name || ev.city || 'Événement';
  const location = [ev.placeName, ev.streetAddress, ev.city, ev.postalCode]
    .filter(Boolean).join(', ');
  const details  = [
    ev.description ? ev.description.slice(0, 300) : '',
    ev.organizer   ? `Organisateur : ${ev.organizer}` : '',
    ev.freeEntry !== undefined ? (ev.freeEntry ? 'Entrée gratuite' : 'Entrée payante') : '',
    `Source : ${ev.url}`,
  ].filter(Boolean).join('\n');

  const p = new URLSearchParams({
    action : 'TEMPLATE',
    text   : title,
    ...(dates    ? { dates    } : {}),
    ...(location ? { location } : {}),
    ...(details  ? { details  } : {}),
  });
  return `https://calendar.google.com/calendar/render?${p.toString()}`;
}

// ── Tri par colonne ───────────────────────────────────────────────────
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDesc = !sortDesc;
    else { sortCol = col; sortDesc = false; }
    render();
  });
});

// ── Slider rayon ─────────────────────────────────────────────────────
const slider = document.getElementById('radius-slider');
slider.addEventListener('input', () => {
  document.getElementById('radius-label').textContent = slider.value + ' km';
  render();
});

document.getElementById('filter-cat').addEventListener('change', render);
document.getElementById('filter-month').addEventListener('change', render);
document.getElementById('filter-free').addEventListener('change', render);

// Init
render();
</script>
