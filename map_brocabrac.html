<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geobrad — Brocabrac 59, 62 &amp; 74 — 2026</title>

  <!-- Leaflet -->
  <link  rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MarkerCluster -->
  <link  rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link  rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Données scrapées (généré par scraper_brocabrac.js) -->
  <script src="events_data_brocabrac.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Barre du haut ─── */
    #topbar {
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      z-index: 1000;
    }

    #topbar h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e94560;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #topbar h1 span { color: #aaa; font-weight: 400; font-size: .9rem; }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ctrl-group label {
      font-size: .8rem;
      color: #aaa;
      white-space: nowrap;
    }

    select {
      background: #0f3460;
      color: #eee;
      border: 1px solid #e94560;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: .8rem;
      cursor: pointer;
    }

    button {
      background: #e94560;
      border: none;
      color: #fff;
      border-radius: 4px;
      padding: 6px 14px;
      font-size: .8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }
    button:hover { background: #c73652; }

    #count-badge {
      background: #0f3460;
      border: 1px solid #e94560;
      border-radius: 12px;
      padding: 3px 10px;
      font-size: .75rem;
      color: #e94560;
      white-space: nowrap;
    }

    /* ─── Carte ─── */
    #map {
      flex: 1;
      width: 100%;
    }

    /* ─── Popup Leaflet ─── */
    .leaflet-popup-content-wrapper {
      background: #16213e;
      color: #eee;
      border-radius: 8px;
      border: 1px solid #e94560;
      box-shadow: 0 4px 20px rgba(0,0,0,.6);
    }
    .leaflet-popup-tip { background: #e94560; }
    .leaflet-popup-content { margin: 0; min-width: 220px; max-width: 340px; }

    .popup-title {
      background: #e94560;
      color: #fff;
      padding: 10px 14px;
      font-weight: 700;
      font-size: .95rem;
      border-radius: 6px 6px 0 0;
    }

    .popup-body {
      padding: 10px 14px;
      font-size: .82rem;
      line-height: 1.6;
    }

    .popup-tag {
      display: inline-block;
      background: #0f3460;
      border: 1px solid #e94560;
      border-radius: 10px;
      padding: 1px 8px;
      font-size: .72rem;
      margin: 2px 2px 0 0;
      text-transform: capitalize;
      color: #e94560;
    }

    .popup-date {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      color: #8ecae6;
      font-size: .8rem;
    }

    .popup-section { margin-top: 8px; }
    .popup-section strong { color: #aaa; font-size: .76rem; text-transform: uppercase; letter-spacing: .05em; }
    .popup-link {
      display: inline-block;
      margin-top: 4px;
      color: #e94560;
      font-size: .78rem;
      text-decoration: none;
    }
    .popup-link:hover { text-decoration: underline; }

    .popup-img {
      width: 100%;
      max-height: 140px;
      object-fit: cover;
      border-radius: 4px;
      margin-top: 8px;
    }

    /* Cluster */
    .marker-cluster-small  { background-color: rgba(100,160,255,.4) !important; }
    .marker-cluster-medium { background-color: rgba(100,160,255,.6) !important; }
    .marker-cluster-large  { background-color: rgba(100,160,255,.8) !important; }
    .marker-cluster { color: #fff !important; font-weight: 700; }

    /* ─── Légende mois ─── */
    #legend {
      position: absolute;
      bottom: 36px;
      right: 12px;
      background: #16213eee;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 10px 14px;
      z-index: 500;
      font-size: .76rem;
      line-height: 1.9;
      min-width: 120px;
      backdrop-filter: blur(4px);
    }
    #legend strong {
      display: block;
      color: #aaa;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }
    .legend-dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      border: 1px solid rgba(255,255,255,.3);
    }

    /* ─── Indicateur de géolocalisation ─── */
    #geo-status {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #16213e;
      border: 1px solid #e94560;
      color: #eee;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: .8rem;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity .4s;
    }
    #geo-status.show { opacity: 1; }

    /* ─── Navbar ─── */
    #navbar {
      background: #0a0a1a;
      border-bottom: 1px solid #0f3460;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 0;
      z-index: 1001;
      flex-shrink: 0;
    }
    .nav-brand {
      font-size: .9rem;
      font-weight: 700;
      color: #e94560;
      margin-right: 8px;
      white-space: nowrap;
      padding: 10px 0;
    }
    .nav-link {
      display: inline-flex;
      align-items: center;
      padding: 10px 14px;
      color: #aaa;
      text-decoration: none;
      font-size: .82rem;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
    }
    .nav-link:hover { color: #eee; border-bottom-color: #555; }
    .nav-link.active { color: #e94560; border-bottom-color: #e94560; }

    /* ─── Panel filtre villes ─── */
    #cities-wrapper {
      position: relative;
    }

    #btn-cities {
      background: #0f3460;
      border: 1px solid #e94560;
      color: #eee;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #btn-cities.active {
      background: #e94560;
      color: #fff;
    }
    #btn-cities:hover { background: #1a4a80; }
    #btn-cities.active:hover { background: #c73652; }

    #cities-panel {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: #16213e;
      border: 1px solid #e94560;
      border-radius: 6px;
      z-index: 2000;
      width: 240px;
      box-shadow: 0 6px 24px rgba(0,0,0,.7);
      padding: 8px;
    }
    #cities-panel.hidden { display: none; }

    #cities-search {
      width: 100%;
      background: #0f3460;
      border: 1px solid #555;
      color: #eee;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: .8rem;
      margin-bottom: 6px;
    }
    #cities-search:focus { outline: none; border-color: #e94560; }

    #btn-cities-reset {
      width: 100%;
      padding: 3px 8px;
      font-size: .75rem;
      margin-bottom: 6px;
      background: #0f3460;
      border: 1px solid #555;
    }
    #btn-cities-reset:hover { background: #1a4a80; }

    #cities-list {
      list-style: none;
      max-height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #e94560 #0f3460;
    }
    #cities-list li {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 4px;
      border-radius: 4px;
      cursor: pointer;
      font-size: .8rem;
    }
    #cities-list li:hover { background: #0f3460; }
    #cities-list li input[type=checkbox] { accent-color: #e94560; cursor: pointer; flex-shrink: 0; }
    #cities-list li label { cursor: pointer; flex: 1; }
    #cities-list .city-count { color: #aaa; font-size: .72rem; }
  </style>
</head>
<body>

<nav id="navbar">
  <span class="nav-brand">🗺 Geobrad</span>
  <a href="map_brocabrac.html" class="nav-link active">🗺 Carte</a>
  <a href="nearby.html" class="nav-link">📍 Proximité</a>
</nav>

<div id="topbar">
  <h1>🗺 Geobrad <span>— Brocabrac 59, 62 &amp; 74 — 2026</span></h1>

  <div class="ctrl-group">
    <label>Mois :</label>
    <select id="filter-month">
      <option value="">Tous</option>
      <option value="04">Avril</option>
      <option value="05">Mai</option>
      <option value="06">Juin</option>
      <option value="07">Juillet</option>
      <option value="08">Août</option>
      <option value="09">Septembre</option>
      <option value="10">Octobre</option>
      <option value="11">Novembre</option>
      <option value="12">Décembre</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>Catégorie :</label>
    <select id="filter-cat">
      <option value="">Toutes</option>
      <option value="braderie">Braderie</option>
      <option value="brocante">Brocante</option>
      <option value="vide-grenier">Vide-grenier</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>Entrée :</label>
    <select id="filter-free">
      <option value="">Toutes</option>
      <option value="1">Libre</option>
      <option value="0">Payante</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>À partir du :</label>
    <input type="date" id="filter-date" />
  </div>

  <button id="btn-locate">📍 Autour de moi</button>

  <div class="ctrl-group" id="cities-wrapper">
    <label>Villes :</label>
    <button id="btn-cities" type="button">Toutes les villes</button>
    <div id="cities-panel" class="hidden">
      <input type="text" id="cities-search" placeholder="🔍 Rechercher une ville…" autocomplete="off" />
      <button type="button" id="btn-cities-reset">↩ Réinitialiser (toutes)</button>
      <ul id="cities-list"></ul>
    </div>
  </div>

  <span id="count-badge">-- événements</span>
</div>

<div id="map"></div>
<div id="legend"></div>
<div id="geo-status"></div>

<script>
// ─── Init carte ──────────────────────────────────────────────────────
const map = L.map('map', {
  center : [50.5, 2.8],
  zoom   : 9,
});

L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
  attribution : '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributeurs | <a href="https://brocabrac.fr">brocabrac.fr</a>',
  maxZoom     : 19,
}).addTo(map);

// ─── Couleurs par mois ───────────────────────────────────────────────
const MONTH_COLORS = {
  '04': '#f9c74f',
  '05': '#90be6d',
  '06': '#43aa8b',
  '07': '#4cc9f0',
  '08': '#4361ee',
  '09': '#7209b7',
  '10': '#f77f00',
  '11': '#d62828',
  '12': '#e9c46a',
};
const MONTH_NAMES = {
  '04':'Avril','05':'Mai','06':'Juin','07':'Juillet',
  '08':'Août','09':'Septembre','10':'Octobre',
  '11':'Novembre','12':'Décembre',
};

/** Extrait le mois (MM) depuis une date ISO "2026-04-18T..." ou "2026-04-18" */
function eventMonth(ev) {
  const d = ev.startDate || '';
  return d.length >= 7 ? d.slice(5, 7) : null;
}

/** Formate une date ISO en lisible (ex: "Samedi 18 avril 2026") */
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso.slice(0, 10);
  return d.toLocaleDateString('fr-FR', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
  });
}

/** Formate une heure ISO */
function formatTime(iso) {
  if (!iso || !iso.includes('T')) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

// ─── Icône personnalisée (goutte colorée par mois) ───────────────────
function makeIcon(month) {
  const color = MONTH_COLORS[month] || '#aaa';
  return L.divIcon({
    className : '',
    html      : `<div style="
      width:26px; height:26px; border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      background:${color};
      border:2px solid #fff;
      box-shadow:0 2px 8px rgba(0,0,0,.55);
    "></div>`,
    iconSize   : [26, 26],
    iconAnchor : [13, 26],
    popupAnchor: [0, -28],
  });
}

// ─── Couche cluster ───────────────────────────────────────────────────
const cluster = L.markerClusterGroup({
  showCoverageOnHover   : false,
  maxClusterRadius      : 60,
  spiderfyOnMaxZoom     : true,
  disableClusteringAtZoom : 13,
});
map.addLayer(cluster);

// ─── Popup ───────────────────────────────────────────────────────────
const CAT_LABEL = {
  braderie    : '📢 Braderie',
  brocante    : '🛒 Brocante',
  'vide-grenier': '📦 Vide-grenier',
};

function buildPopup(ev) {
  const freeLabel = ev.freeEntry
    ? '<span class="popup-tag" style="color:#2ecc71;border-color:#2ecc71">entrée gratuite</span>'
    : '<span class="popup-tag" style="color:#f77f00;border-color:#f77f00">entrée payante</span>';

  const catLabel = CAT_LABEL[ev.category] || ev.category || 'Événement';
  const catTag   = `<span class="popup-tag">${catLabel}</span>`;

  const dateStr  = formatDate(ev.startDate);
  const timeStr  = formatTime(ev.startDate);
  const endTime  = formatTime(ev.endDate);
  const timeRange = timeStr
    ? `⏰ ${timeStr}${endTime && endTime !== timeStr ? ' – ' + endTime : ''}`
    : '';

  const city     = ev.city || 'Lieu inconnu';
  const dept     = ev.postalCode ? ev.postalCode.slice(0, 2) : '';
  const deptLbl  = dept ? `<span style="color:#aaa;font-size:.76rem"> (${dept})</span>` : '';
  const addr     = [ev.placeName, ev.streetAddress].filter(Boolean).join(' — ');

  const imgHtml  = ev.image
    ? `<img class="popup-img" src="${ev.image}" alt="" loading="lazy" />`
    : '';

  const descHtml = ev.description
    ? `<div class="popup-section"><strong>Description</strong><br/>${ev.description.slice(0, 200)}${ev.description.length > 200 ? '…' : ''}</div>`
    : '';

  return `
    <div class="popup-title">${ev.name || city}${deptLbl}</div>
    <div class="popup-body">
      <div>${catTag} ${freeLabel}</div>
      <div class="popup-date">📅 ${dateStr}</div>
      ${timeRange ? `<div class="popup-date">${timeRange}</div>` : ''}
      ${addr ? `<div class="popup-section"><strong>Lieu</strong><br/>${addr}<br/>${city} ${ev.postalCode || ''}</div>` : `<div class="popup-section">${city}</div>`}
      ${ev.organizer ? `<div class="popup-section"><strong>Organisateur</strong><br/>${ev.organizer.slice(0, 120)}</div>` : ''}
      ${descHtml}
      ${imgHtml}
      <a class="popup-link" href="${ev.url}" target="_blank" rel="noopener">🔗 Voir la fiche brocabrac.fr</a>
    </div>`;
}

// ─── Marqueurs ───────────────────────────────────────────────────────
const allMarkers = [];

if (typeof BROCABRAC_EVENTS === 'undefined') {
  const s = document.getElementById('geo-status');
  s.textContent = '⚠ events_data_brocabrac.js introuvable — lance d\'abord : node scraper_brocabrac.js';
  s.classList.add('show');
} else {
  BROCABRAC_EVENTS.forEach(ev => {
    if (ev.lat == null || ev.lng == null) return;
    const month  = eventMonth(ev);
    const marker = L.marker([ev.lat, ev.lng], { icon: makeIcon(month) });
    marker.bindPopup(buildPopup(ev), { maxWidth: 360 });
    marker._evData = ev;
    marker._month  = month;
    allMarkers.push(marker);
  });

  // Légende dynamique
  const usedMonths = [...new Set(allMarkers.map(m => m._month).filter(Boolean))].sort();
  const legendEl   = document.getElementById('legend');
  legendEl.innerHTML = '<strong>Mois</strong>' +
    usedMonths.map(m =>
      `<div><span class="legend-dot" style="background:${MONTH_COLORS[m]}"></span>${MONTH_NAMES[m] || m}</div>`
    ).join('');
}

// ─── Filtre Villes (localStorage) ────────────────────────────────────
const LS_CITIES_KEY = 'geobrad_cities_filter';

/** selectedCities vide = pas de filtre (toutes visibles) */
let selectedCities = new Set();
try {
  const stored = JSON.parse(localStorage.getItem(LS_CITIES_KEY));
  if (Array.isArray(stored) && stored.length > 0) {
    selectedCities = new Set(stored);
  }
} catch(e) {}

let allCities = [];

if (typeof BROCABRAC_EVENTS !== 'undefined') {
  // Compter les événements par ville
  const cityCount = {};
  BROCABRAC_EVENTS.forEach(ev => {
    const c = (ev.city || '').trim();
    if (c) cityCount[c] = (cityCount[c] || 0) + 1;
  });
  allCities = Object.keys(cityCount).sort((a, b) => a.localeCompare(b, 'fr'));
  buildCitiesList(allCities, cityCount);
  updateCitiesButton();
}

function saveCities() {
  if (selectedCities.size === 0) {
    localStorage.removeItem(LS_CITIES_KEY);
  } else {
    localStorage.setItem(LS_CITIES_KEY, JSON.stringify([...selectedCities]));
  }
}

function updateCitiesButton() {
  const btn = document.getElementById('btn-cities');
  if (selectedCities.size === 0) {
    btn.textContent = 'Toutes les villes';
    btn.classList.remove('active');
  } else {
    btn.textContent = `${selectedCities.size} ville${selectedCities.size > 1 ? 's' : ''}`;
    btn.classList.add('active');
  }
}

function buildCitiesList(cities, counts) {
  const ul = document.getElementById('cities-list');
  ul.innerHTML = '';
  if (!counts) {
    // rebuild counts from allCities (after search filter)
    counts = {};
    BROCABRAC_EVENTS.forEach(ev => {
      const c = (ev.city || '').trim();
      if (c) counts[c] = (counts[c] || 0) + 1;
    });
  }
  cities.forEach(city => {
    const li  = document.createElement('li');
    const cb  = document.createElement('input');
    const lbl = document.createElement('label');
    const cnt = document.createElement('span');

    cb.type    = 'checkbox';
    cb.id      = `city-cb-${city}`;
    cb.checked = selectedCities.has(city);

    lbl.htmlFor   = cb.id;
    lbl.textContent = city;

    cnt.className   = 'city-count';
    cnt.textContent = `(${counts[city] || 0})`;

    li.appendChild(cb);
    li.appendChild(lbl);
    li.appendChild(cnt);

    cb.addEventListener('change', () => {
      if (cb.checked) selectedCities.add(city);
      else            selectedCities.delete(city);
      saveCities();
      updateCitiesButton();
      applyFilters();
    });

    // clic sur la ligne = toggle la checkbox
    li.addEventListener('click', e => {
      if (e.target !== cb) cb.click();
    });

    ul.appendChild(li);
  });
}

// Toggle panel
document.getElementById('btn-cities').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('cities-panel').classList.toggle('hidden');
  if (!document.getElementById('cities-panel').classList.contains('hidden')) {
    document.getElementById('cities-search').focus();
  }
});

// Fermer en cliquant en dehors
document.addEventListener('click', e => {
  const panel  = document.getElementById('cities-panel');
  const btn    = document.getElementById('btn-cities');
  if (!panel.classList.contains('hidden') && !panel.contains(e.target) && e.target !== btn) {
    panel.classList.add('hidden');
  }
});

// Recherche dans la liste
document.getElementById('cities-search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  const filtered = allCities.filter(c => c.toLowerCase().includes(q));
  buildCitiesList(filtered);
});

// Réinitialiser = effacer la sélection (toutes les villes visibles)
document.getElementById('btn-cities-reset').addEventListener('click', () => {
  selectedCities.clear();
  saveCities();
  updateCitiesButton();
  applyFilters();
  const q = document.getElementById('cities-search').value.toLowerCase().trim();
  buildCitiesList(allCities.filter(c => c.toLowerCase().includes(q)));
});

// ─── Filtres ─────────────────────────────────────────────────────────
function applyFilters() {
  const month    = document.getElementById('filter-month').value;
  const cat      = document.getElementById('filter-cat').value;
  const free     = document.getElementById('filter-free').value;
  const dateFrom = document.getElementById('filter-date').value;

  cluster.clearLayers();
  let count = 0;

  allMarkers.forEach(m => {
    const ev = m._evData;

    if (month    && m._month !== month) return;
    if (cat      && ev.category !== cat) return;
    if (free === '1' && !ev.freeEntry) return;
    if (free === '0' &&  ev.freeEntry) return;
    if (dateFrom && (ev.startDate || '').slice(0, 10) < dateFrom) return;
    if (selectedCities.size > 0 && !selectedCities.has((ev.city || '').trim())) return;

    cluster.addLayer(m);
    count++;
  });

  document.getElementById('count-badge').textContent =
    `${count} événement${count !== 1 ? 's' : ''}`;
}

document.getElementById('filter-month').addEventListener('change', applyFilters);
document.getElementById('filter-cat').addEventListener('change', applyFilters);
document.getElementById('filter-free').addEventListener('change', applyFilters);
document.getElementById('filter-date').addEventListener('change', applyFilters);

// Initialiser à aujourd'hui puis appliquer
document.getElementById('filter-date').value = new Date().toISOString().slice(0, 10);
applyFilters();

// ─── Géolocalisation ─────────────────────────────────────────────────
let userCircle = null;
let userMarker = null;

document.getElementById('btn-locate').addEventListener('click', () => {
  const statusEl = document.getElementById('geo-status');

  if (!navigator.geolocation) {
    show(statusEl, '⚠ Géolocalisation non disponible dans ce navigateur');
    return;
  }

  statusEl.textContent = '🔍 Localisation en cours…';
  statusEl.classList.add('show');

  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;

      if (userMarker) map.removeLayer(userMarker);
      if (userCircle) map.removeLayer(userCircle);

      userCircle = L.circle([lat, lng], {
        radius      : accuracy,
        color       : '#8ecae6',
        fillColor   : '#8ecae6',
        fillOpacity : 0.15,
        weight      : 1,
        dashArray   : '4 4',
      }).addTo(map);

      userMarker = L.marker([lat, lng], {
        icon: L.divIcon({
          className : '',
          html: `<div style="
            width:18px; height:18px; border-radius:50%;
            background:#8ecae6; border:3px solid #fff;
            box-shadow:0 0 0 4px rgba(142,202,230,.35);
          "></div>`,
          iconSize   : [18, 18],
          iconAnchor : [9, 9],
        }),
      }).addTo(map).bindPopup('<b>📍 Vous êtes ici</b>').openPopup();

      map.setView([lat, lng], 11);
      show(statusEl, `📍 Position trouvée (précision ~${Math.round(accuracy)} m)`, 3000);
    },
    err => {
      show(statusEl, `⚠ ${err.message}`, 4000);
    },
    { enableHighAccuracy: true, timeout: 10_000 }
  );
});

function show(el, msg, autoHide) {
  el.textContent = msg;
  el.classList.add('show');
  if (autoHide) setTimeout(() => el.classList.remove('show'), autoHide);
}
</script>
